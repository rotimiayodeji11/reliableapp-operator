# This rule is not used by the project reliableapp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ebay.training.ebay.training resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: reliableapp-operator
    app.kubernetes.io/managed-by: kustomize
  name: reliableapp-viewer-role
rules:
- apiGroups:
  - ebay.training.ebay.training
  resources:
  - reliableapps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ebay.training.ebay.training
  resources:
  - reliableapps/status
  verbs:
  - get
